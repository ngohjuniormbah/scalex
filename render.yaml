# Render blueprint — deploy with "New → Blueprint" pointing at this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: scalex-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn scalex.wsgi:application"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # Paste your Supabase connection string here in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      # Paste your deployed frontend URL here (e.g. https://scalex.vercel.app).
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: scalex-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      # Paste your deployed API URL here (e.g. https://scalex-api.onrender.com).
      - key: NEXT_PUBLIC_API_URL
        sync: false
